<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hanoi Master - Playing</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        #game-area {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 60vh;
            margin-top: 50px;
            padding: 0 10%;
        }
        .tower-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 200px;
            height: 100%;
            position: relative;
        }
        .peg {
            width: 16px;
            height: 300px;
            background: linear-gradient(90deg, #2c3e50, #bdc3c7, #2c3e50);
            border-radius: 8px 8px 0 0;
            position: absolute;
            bottom: 0;
            z-index: 1;
            box-shadow: 0 0 15px rgba(0,243,255,0.2);
        }
        .peg-base {
            width: 180px;
            height: 20px;
            background: #1a1a2e;
            border-bottom: 4px solid var(--neon-blue);
            position: absolute;
            bottom: -20px;
            border-radius: 5px;
        }
        .disc-stack {
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            width: 100%;
            height: 100%;
            z-index: 2;
            position: relative;
        }
        .disc {
            height: 30px;
            border-radius: 15px;
            margin-bottom: 2px;
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
        }
        .disc:active { cursor: grabbing; scale: 1.05; }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            font-size: 1.2rem;
            color: var(--neon-blue);
        }
        .game-controls {
            text-align: center;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <div class="stats-bar glass-panel">
        <div>Moves: <span id="move-count">0</span></div>
        <div>Optimal: <span id="optimal-count">--</span></div>
        <div>Time: <span id="timer">00:00</span></div>
    </div>

    <div id="game-area">
        <div class="tower-container" id="tower-1" ondrop="drop(event)" ondragover="allowDrop(event)">
            <div class="peg"></div>
            <div class="disc-stack" id="stack-1"></div>
            <div class="peg-base"></div>
        </div>
        <div class="tower-container" id="tower-2" ondrop="drop(event)" ondragover="allowDrop(event)">
            <div class="peg"></div>
            <div class="disc-stack" id="stack-2"></div>
            <div class="peg-base"></div>
        </div>
        <div class="tower-container" id="tower-3" ondrop="drop(event)" ondragover="allowDrop(event)">
            <div class="peg"></div>
            <div class="disc-stack" id="stack-3"></div>
            <div class="peg-base"></div>
        </div>
    </div>

    <div class="game-controls">
        <button class="btn-neon" onclick="startSimulation()">Auto-Solve</button>
        <button class="btn-neon" style="border-color: #ffd700; color: #ffd700;" onclick="showHint()">💡 Hint</button>
        <button class="btn-neon" style="border-color: red; color: red;" onclick="location.reload()">Reset</button>
    </div>

    <script th:src="@{/js/game-logic.js}"></script>
    <script>
        // Extract level from URL and start
        const pathParts = window.location.pathname.split('/');
        const level = parseInt(pathParts[pathParts.length - 1]);
        initGame(level);
    </script>
</body>
</html>
