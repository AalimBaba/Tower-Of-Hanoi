# --- SERVER & DATABASE ---
server.port=8080
spring.datasource.url=jdbc:h2:mem:hanoidb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- H2 CONSOLE (The fix for your 404) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update

# --- SECURITY ---
spring.security.user.name=admin
spring.security.user.password=admin

# --- DSA RESEARCH & LOGGING ---
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
# This helps the console show through Spring Security frames
spring.jpa.properties.hibernate.frame_options.disable=true